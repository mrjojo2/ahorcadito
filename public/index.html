<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ahorcadito Multijugador - Roba la Palabra</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Pantalla de login -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>🎮 AHORCADITO MULTIJUGADOR</h1>
            <p>🎯 ¡Roba la palabra desde el chat!</p>
            <input type="text" id="playerName" placeholder="Tu nombre" maxlength="20" autocomplete="off">
            <button onclick="connectToGame()">🎯 Unirse al juego</button>
            <small>Máximo 10 jugadores | 2 intentos de robo por ronda</small>
        </div>
    </div>

    <!-- Pantalla del juego -->
    <div id="gameScreen" style="display: none;">
        <div class="game-container">
            <div class="game-header">
                <h1>✧ AHORCADITO - ROBA PALABRAS ✧</h1>
                <div class="players-online">
                    👥 Conectados: <span id="playerCount">0</span>
                </div>
            </div>

            <div class="game-board">
                <!-- Panel izquierdo: dibujo -->
                <div class="hangman-section">
                    <div class="hangman-area">
                        <canvas id="hangmanCanvas" width="350" height="350"></canvas>
                    </div>
                    <div class="current-turn" id="currentTurn">
                        🎲 Esperando jugadores...
                    </div>
                </div>

                <!-- Panel derecho: juego -->
                <div class="game-section">
                    <div class="word-display" id="wordDisplay">_ _ _ _ _</div>

                    <div class="points-info" id="pointsAtStake">
                        💰 Puntos en juego: 0
                    </div>

                    <div class="mistakes">
                        ❌ Errores: <span id="errorCount">0</span> / <span id="maxErrors">7</span>
                    </div>

                    <div class="keyboard" id="keyboardContainer"></div>

                    <div class="game-messages">
                        <div class="messages-title">📢 Mensajes del juego</div>
                        <div id="messagesList" class="messages-list"></div>
                    </div>

                    <div class="chat-section">
                        <input type="text" id="chatInput" placeholder="💬 Escribe aquí - ¡O LA PALABRA COMPLETA PARA ROBAR! (2 intentos)" maxlength="100">
                        <button id="sendChat">Enviar</button>
                    </div>
                </div>
            </div>

            <!-- Lista de jugadores -->
            <div class="players-section">
                <h3>👥 Jugadores en partida</h3>
                <div id="playersList" class="players-list"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
