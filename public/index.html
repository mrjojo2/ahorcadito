<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorcadito Multijugador - Juego en Red</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>🎮 AHORCADITO MULTIJUGADOR</h1>
            <p>Conéctate y juega con hasta 10 personas</p>
            <input type="text" id="playerName" placeholder="Tu nombre" maxlength="20" autocomplete="off">
            <button onclick="connectToGame()">🎯 Unirse al juego</button>
            <small>Máximo 10 jugadores simultáneos</small>
        </div>
    </div>

    <div id="gameScreen" style="display: none;">
        <div class="game-container">
            <div class="game-header">
                <h1>🎮 AHORCADITO MULTIJUGADOR</h1>
                <div class="players-online">
                    <span>👥 Jugadores online: </span>
                    <span id="playerCount">0</span>
                </div>
            </div>
            
            <div class="game-main">
                <div class="left-panel">
                    <canvas id="hangmanCanvas" width="350" height="350"></canvas>
                    <div class="current-turn" id="currentTurn">
                        🎯 Esperando turno...
                    </div>
                </div>
                
                <div class="right-panel">
                    <div class="word-display" id="wordDisplay"></div>
                    
                    <div class="mistakes">
                        ❌ Errores: <span id="errorCount">0</span> / <span id="maxErrors">7</span>
                    </div>
                    
                    <div class="keyboard" id="keyboardContainer"></div>
                    
                    <div class="game-messages" id="gameMessages">
                        <div class="messages-title">📢 Mensajes del juego</div>
                        <div id="messagesList"></div>
                    </div>
                    
                    <div class="chat-section">
                        <input type="text" id="chatInput" placeholder="Chatea con otros jugadores..." maxlength="100">
                        <button id="sendChat">Enviar</button>
                    </div>
                </div>
            </div>
            
            <div class="players-list" id="playersList"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
